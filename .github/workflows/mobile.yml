# Mobile CI — Flutter 3.22 (Riverpod + Dio + Hive)
#
# Triggers:
#   - push / PR that touches mobile/ or this workflow
#   - manual dispatch (debugging)
#
# Jobs:
#   analyze_test:
#     - pub get
#     - format check (dart format --output none --set-exit-if-changed)
#     - analyze (flutter analyze --fatal-infos --fatal-warnings)
#     - test (flutter test)
#     - build Android APK in debug mode (smoke test only — production builds via release pipeline later)

name: mobile

on:
  push:
    branches: [main, develop]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"
  workflow_dispatch:

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: mobile

jobs:
  analyze_test:
    name: Analyze + test (Flutter 3.22)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17 (required for Android Gradle Plugin 8.x)
        # AGP 8.7 (in mobile/android/settings.gradle.kts) needs JDK 17.
        # Downgraded from AGP 9 + JDK 21 combo (Mar 2026 release) due to
        # Flutter 3.44 incompatibility — see Flutter#169475.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # 3.44.x ships Dart 3.12 — current stable on dev machine.
          # Keeping CI Flutter == local Flutter prevents `dart format` drift
          # between dev environment and CI (Dart formatter rules change
          # subtly across major Dart versions).
          # Version history: 3.22 → 3.27 → 3.32 → 3.44.
          flutter-version: "3.44.x"
          channel: stable
          cache: true
          # Bump suffix to bust stale cache when Flutter version changes.
          cache-key: "flutter-v2-:os:-:channel:-:version:-:arch:"

      - name: Show Flutter / Dart versions
        run: flutter --version

      - name: Get dependencies
        run: flutter pub get

      - name: Run build_runner (generate .freezed.dart, .g.dart, .config.dart)
        # Required before flutter analyze because *.dart files reference
        # generated symbols (e.g., _$AuthUserFromJson, _AuthUser, etc.).
        # --delete-conflicting-outputs handles stale outputs from previous runs.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting (dart format)
        # Excludes generated files (.freezed.dart, .g.dart, etc.) to avoid
        # false positives from machine-generated code.
        run: |
          dart format \
            --output none \
            --set-exit-if-changed \
            $(find lib test -name "*.dart" \
              ! -name "*.freezed.dart" \
              ! -name "*.g.dart" \
              ! -name "*.gr.dart" \
              ! -name "*.config.dart")

      - name: Static analysis (flutter analyze)
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: Run tests
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobile-coverage
          path: mobile/coverage/lcov.info
          if-no-files-found: ignore
          retention-days: 14

      # ─── Android APK smoke build — TEMPORARILY DISABLED ──────────────────────
      #
      # Status: deferred to M01 / Sprint 03 release workflow.
      #
      # Why: Flutter 3.44 ships with a regression in the Flutter tool's package
      # config resolver (see https://github.com/flutter/flutter/issues/169475
      # — "Bad state: Could not determine run package name"). The bug is
      # triggered when the Flutter Gradle plugin invokes `flutter` from inside
      # the android/ subproject. We verified the bug persists across:
      #   - AGP 9.0.1 / Gradle 9.1.0 / Kotlin 2.3.20 / JDK 21
      #   - AGP 8.7.3 / Gradle 8.10.2 / Kotlin 2.1.0 / JDK 17
      #   - AGP 8.11.0 / Gradle 8.13   / Kotlin 2.2.20 / JDK 17
      # → root cause is in `flutter_tools`, not Android toolchain. No config
      #   tweak on our side fixes it.
      #
      # Why disabling is OK for scaffold:
      #   - flutter analyze + flutter test already verify Dart code compiles.
      #   - There is no functional UI / auth / native integration code yet —
      #     a failing native build doesn't reveal real product bugs.
      #
      # Re-enable plan (M01 / Sprint 03):
      #   1. Upgrade Flutter to 3.45+ once Flutter#169475 is resolved upstream
      #      (track at https://github.com/flutter/flutter/issues/169475), OR
      #      adopt the documented workaround when one is posted.
      #   2. Author a separate `release.yml` workflow with proper Android
      #      signing keys (stored as repo secrets), bundle generation
      #      (--release flavor), and artifact distribution (Firebase App
      #      Distribution / Play Internal Track).
      #   3. Keep this `mobile.yml` focused on analyze + test + format only.
      #
      # - name: Flutter clean
      #   run: flutter clean
      # - name: Re-fetch deps + generated files
      #   run: |
      #     flutter pub get
      #     dart run build_runner build --delete-conflicting-outputs
      # - name: Build Android APK (debug smoke)
      #   run: flutter build apk --debug --target-platform android-arm64
