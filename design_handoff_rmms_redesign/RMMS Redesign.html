<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RMMS — Redesign 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* ---- Brand: refreshed indigo→violet with electric accent ---- */
    --indigo: #5B5BF0;
    --indigo-deep: #4338CA;
    --indigo-bright: #7C7CFF;
    --violet: #8B5CF6;
    --emerald: #10B981;
    --emerald-soft: #ECFDF5;
    --amber: #F59E0B;
    --amber-soft: #FFFBEB;
    --rose: #F43F5E;
    --sky: #0EA5E9;

    /* ---- Neutrals (cool, slightly warm white) ---- */
    --ink: #161528;
    --body: #45445C;
    --muted: #8A89A3;
    --faint: #B6B5CC;
    --line: #ECECF3;
    --surface: #FFFFFF;
    --surface-2: #F5F5FB;
    --bg: #F1F1F8;

    --r-sm: 14px;
    --r: 20px;
    --r-lg: 28px;
    --r-xl: 34px;

    --shadow-sm: 0 1px 2px rgba(22,21,40,0.04), 0 4px 12px rgba(22,21,40,0.04);
    --shadow: 0 2px 6px rgba(22,21,40,0.05), 0 14px 36px rgba(22,21,40,0.07);
    --shadow-lg: 0 8px 24px rgba(67,56,202,0.16), 0 24px 56px rgba(67,56,202,0.14);
    --shadow-brand: 0 10px 30px rgba(91,91,240,0.38);

    --grad-brand: linear-gradient(135deg, #7C7CFF 0%, #5B5BF0 48%, #4338CA 100%);
    --grad-mesh: radial-gradient(120% 120% at 0% 0%, #8B5CF6 0%, transparent 55%), radial-gradient(120% 120% at 100% 30%, #5B5BF0 0%, transparent 60%), linear-gradient(140deg, #4338CA, #5B5BF0);
    --grad-emerald: linear-gradient(135deg, #34D399, #059669);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #E6E6F0;
    font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  #root { display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 32px 16px; }

  /* page scaffold for the framed app */
  .stage-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
  .stage-caption { font-size: 13px; color: #6E6D87; font-weight: 600; letter-spacing: 0.2px; }

  /* the in-phone app surface */
  .app {
    position: relative; width: 100%; height: 100%; background: var(--bg);
    display: flex; flex-direction: column; overflow: hidden;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  }
  .screen { position: relative; flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .scroll::-webkit-scrollbar { display: none; }

  /* typography helpers */
  .display { font-family: 'Space Grotesk', system-ui; }
  .tnum { font-variant-numeric: tabular-nums; }

  /* press feedback */
  .press { transition: transform .14s cubic-bezier(.2,.8,.2,1), box-shadow .18s, background .18s; cursor: pointer; }
  .press:active { transform: scale(.965); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { transform: scale(.96); } to { transform: scale(1); } }
  @keyframes sheetUp { from { transform: translateY(110%); } to { transform: translateY(0); } }
  @keyframes scaleBar { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes pulseRing { 0% { transform: scale(.9); opacity: .7; } 70% { transform: scale(1.35); opacity: 0; } 100% { opacity: 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }

  @keyframes riseIn { from { transform: translateY(16px); } to { transform: none; } }
  @media (prefers-reduced-motion: no-preference) {
    .stagger > * { animation: riseIn .45s cubic-bezier(.2,.8,.2,1) both; }
    .stagger > *:nth-child(1){animation-delay:.04s}
    .stagger > *:nth-child(2){animation-delay:.10s}
    .stagger > *:nth-child(3){animation-delay:.16s}
    .stagger > *:nth-child(4){animation-delay:.22s}
    .stagger > *:nth-child(5){animation-delay:.28s}
    .stagger > *:nth-child(6){animation-delay:.34s}
    .stagger > *:nth-child(7){animation-delay:.40s}
    .stagger > *:nth-child(8){animation-delay:.46s}
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="ds.jsx"></script>
<script type="text/babel" src="screens-main.jsx"></script>
<script type="text/babel" src="screens-flows.jsx"></script>
<script type="text/babel" src="app-root.jsx"></script>
</body>
</html>
