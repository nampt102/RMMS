include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gr.dart"
    - "**/*.config.dart"
    - "build/**"
  errors:
    invalid_annotation_target: ignore   # freezed + json_serializable interplay
    missing_required_param: error
    missing_return: error
    todo: ignore
    # Constructor-body field assignment (`: _x = x`) is an intentional, readable
    # style here. Newer analyzer/lints bundles flag this; the pinned CI toolchain
    # (Flutter 3.44) does not. Ignore for cross-toolchain consistency.
    prefer_initializing_formals: ignore
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  plugins:
    - custom_lint

linter:
  rules:
    - always_declare_return_types
    - avoid_print
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_locals
    - prefer_final_in_for_each
    - prefer_single_quotes
    - require_trailing_commas
    - unawaited_futures
    - use_super_parameters
    - sort_pub_dependencies
    - sized_box_for_whitespace
