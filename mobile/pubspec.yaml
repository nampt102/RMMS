name: rmms
description: "RMMS 2026 — Mobile app for PG and Leader"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  cached_network_image: ^3.4.1
  camera: ^0.11.0+2 # selfie + store photo for check-in
  collection: ^1.18.0
  device_info_plus: ^11.2.0
  dio: ^5.7.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5 # FCM push
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.16
  freezed_annotation: ^3.0.0
  geolocator: ^13.0.2 # GPS for check-in (BR-204)
  go_router: ^14.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image: ^4.3.0 # EXIF preservation
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  logger: ^2.5.0
  package_info_plus: ^8.1.1
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  pretty_dio_logger: ^1.4.0
  retrofit: 4.9.1
  riverpod_annotation: ^2.3.5
  sentry_flutter: ^8.11.1

dev_dependencies:
  build_runner: ^2.4.13
  custom_lint: ^0.7.3
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.0.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  retrofit_generator: 9.7.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
  generate: true # required for ARB-based l10n
  assets:
    - assets/images/
    - assets/icons/
