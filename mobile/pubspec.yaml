name: rmms
description: "RMMS 2026 — Mobile app for PG and Leader"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.6.1

  # HTTP & API
  dio: ^5.7.0
  retrofit: 4.9.1
  pretty_dio_logger: ^1.4.0

  # Models & immutability
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.5

  # Device / platform
  device_info_plus: ^11.2.0
  package_info_plus: ^8.1.1
  geolocator: ^13.0.2          # GPS for check-in (BR-204)
  permission_handler: ^11.3.1
  camera: ^0.11.0+2            # selfie + store photo for check-in
  image_picker: ^1.1.2
  image: ^4.3.0                # EXIF preservation
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5  # FCM push

  # UI
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  collection: ^1.18.0
  logger: ^2.5.0
  sentry_flutter: ^8.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  retrofit_generator: 9.7.0
  riverpod_generator: ^2.6.3
  riverpod_lint: ^2.6.3
  custom_lint: ^0.7.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true   # required for ARB-based l10n
  assets:
    - assets/images/
    - assets/icons/
